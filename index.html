<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#101010" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Flux Time" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto+Condensed:wght@400;700;900&family=Libre+Franklin:wght@600;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Flux Time</title>
    <!-- Tema aplicado ANTES do primeiro paint: sem isso o React so seta o
         data-theme num useEffect (depois de montar), entao o primeiro paint cai
         no :root (--bg claro #eceef1) e pisca branco — flash ao abrir o app e
         borda branca vazando na safe-area do login (tela de auth e #101010 mas o
         body por baixo fica claro ate o JS rodar). Espelha o initialTheme(). -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("rel-gio:theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <!-- Fallback de fundo escuro no html/body para o intervalo antes do CSS
         (modulo) carregar — o data-theme acima ja garante o --bg correto. -->
    <style>
      html,
      body {
        margin: 0;
        background-color: #101010;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
